<!-- login.html -->
{% extends "base.html" %}
{% block content %}
<div class="page-header">Добро пожаловать в Moxie</div>
<div class="card" style="margin-top: 50px;">
    <h2>Вход</h2>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<p style="color: red;">{{ messages[0] }}</p>{% endif %}
    {% endwith %}
    <form method="POST" action="/login">
        <input type="text" name="username" class="input-text" placeholder="Имя пользователя" required>
        <input type="password" name="password" class="input-text" placeholder="Пароль" required>
        <button type="submit" class="btn-primary" style="width: 100%;">Войти</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        Нет аккаунта? <a href="/register" style="color: var(--primary);">Регистрация</a>
    </p>
</div>
{% endblock %}
